backtest:
  symbol: BTCUSDT
  interval: 1d
  start: "2017-08-01"
  end: null
  warmup_candles: 370
  initial_capital_usdt: 1000.0
  fee_rate: 0.001
  slippage_rate: 0.0005
  output_dir: backtests/allocation_results_v2_improved

strategy:
  name: btc_modern_regime_allocation_v2_improved

indicators:
  sma_200d: 200
  ema_50d: 50
  ema_20d: 20
  rsi_period: 14
  atr_period: 14
  volume_ma: 20
  momentum_windows: [90, 180, 360]

allocation:
  rebalance_threshold: 0.15
  min_trade_usdt: 10
  max_allocation: 0.95

  targets:
    bear_strong: 0.00
    bear_weakening: 0.20
    chop: 0.20
    neutral: 0.25
    accumulation: 0.45
    bull_confirmed: 0.80
    strong_bull: 0.95
    euphoria_reduced: 0.70

  chop_filter:
    enabled: true
    max_abs_dist_sma200d: 0.06
    max_abs_m90: 0.25
    max_abs_sma200_slope20_pct: 0.015
    rsi_low: 45
    rsi_high: 55

  volatility_scaling:
    enabled: true
    high_atr_pct: 0.08
    extreme_atr_pct: 0.11
    high_multiplier: 0.75
    extreme_multiplier: 0.55
backtest:
  symbol: BTCUSDT
  interval: 1d
  start: "2020-08-01"
  end: null
  warmup_candles: 370
  initial_capital_usdt: 1000.0
  fee_rate: 0.001
  slippage_rate: 0.0005
  output_dir: backtests/allocation_results

strategy:
  name: btc_modern_regime_allocation_v1

indicators:
  sma_200d: 200
  ema_50d: 50
  ema_20d: 20
  rsi_period: 14
  atr_period: 14
  volume_ma: 20
  momentum_windows: [90, 180, 360]

allocation:
  rebalance_threshold: 0.10
  min_trade_usdt: 10
  max_allocation: 0.85
  targets:
    bear_strong: 0.00
    bear_weakening: 0.20
    neutral: 0.20
    accumulation: 0.35
    bull_confirmed: 0.70
    strong_bull: 0.85
    euphoria_reduced: 0.60
